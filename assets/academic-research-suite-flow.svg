<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Academic Research Suite Codex workflow overview</title>
  <desc id="desc">A research-paper style system diagram showing how user requests enter the academic-research-suite Codex router, select one of five ARS workflows, load scoped workflow prompts, run quality gates, and produce research or manuscript outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f3b57"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6f7f8d"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#7b8794" flood-opacity="0.18"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #243b53; stroke-width: 1.6; rx: 12; filter: url(#softShadow); }
      .panel-muted { fill: #f4f7fb; stroke: #90a4b8; stroke-width: 1.3; rx: 10; }
      .stage { fill: #eaf2fb; stroke: #1f5d8c; stroke-width: 1.5; rx: 10; }
      .stage-alt { fill: #edf7f2; stroke: #247452; stroke-width: 1.5; rx: 10; }
      .gate { fill: #fff7e6; stroke: #a5671f; stroke-width: 1.4; rx: 10; }
      .output { fill: #f5eefb; stroke: #6d4c92; stroke-width: 1.4; rx: 10; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #102a43; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #52606d; }
      .label { font: 700 17px Arial, Helvetica, sans-serif; fill: #102a43; }
      .small { font: 400 13.5px Arial, Helvetica, sans-serif; fill: #334e68; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #52606d; }
      .mono { font: 700 13px Consolas, Monaco, monospace; fill: #0b4f71; }
      .edge { stroke: #1f3b57; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .edge-muted { stroke: #6f7f8d; stroke-width: 1.7; fill: none; marker-end: url(#arrowMuted); stroke-dasharray: 6 5; }
      .edge-light { stroke: #7b8794; stroke-width: 1.4; fill: none; marker-end: url(#arrowMuted); }
      .dot { fill: #1f5d8c; }
      .caption { font: 400 12px Arial, Helvetica, sans-serif; fill: #627d98; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text x="64" y="56" class="title">Academic Research Suite for Codex</text>
  <text x="64" y="82" class="subtitle">Single Codex skill router for research scoping, paper writing, review, pipelines, and experiment planning</text>

  <rect x="54" y="118" width="220" height="122" class="panel"/>
  <text x="78" y="150" class="label">User Request</text>
  <text x="78" y="178" class="mono">$academic-research-suite</text>
  <text x="78" y="202" class="small">goal, sources, draft,</text>
  <text x="78" y="222" class="small">review comments, constraints</text>

  <rect x="330" y="106" width="248" height="148" class="stage"/>
  <text x="354" y="140" class="label">Root Router</text>
  <text x="354" y="166" class="mono">SKILL.md</text>
  <text x="354" y="192" class="small">detects intent, aliases,</text>
  <text x="354" y="212" class="small">stage, safety boundary</text>
  <text x="354" y="232" class="tiny">loads only required workflow files</text>

  <path class="edge" d="M274 179 C295 179 303 179 330 179"/>

  <rect x="630" y="100" width="264" height="160" class="stage-alt"/>
  <text x="654" y="134" class="label">Route Selection</text>
  <text x="654" y="160" class="small">natural language router</text>
  <text x="654" y="181" class="small">Claude-style alias router</text>
  <text x="654" y="202" class="small">paper-topic Socratic override</text>
  <text x="654" y="228" class="tiny">e.g., ars-plan, ars-lit-review, ars-reviewer</text>

  <path class="edge" d="M578 179 C602 179 611 179 630 179"/>

  <rect x="944" y="118" width="260" height="122" class="panel-muted"/>
  <text x="968" y="150" class="label">Runtime Mapping</text>
  <text x="968" y="176" class="small">Claude ARS concepts mapped to</text>
  <text x="968" y="196" class="small">Codex inline role prompts</text>
  <text x="968" y="218" class="tiny">optional full-runtime profile remains opt-in</text>

  <path class="edge-light" d="M894 179 C918 179 926 179 944 179"/>

  <text x="62" y="300" class="label">Five Workflow Targets</text>
  <text x="62" y="323" class="subtitle">Router chooses one workflow and loads scoped ARS prompts.</text>

  <rect x="54" y="354" width="220" height="126" class="panel"/>
  <text x="78" y="384" class="label">Deep Research</text>
  <text x="78" y="411" class="small">RQ refinement</text>
  <text x="78" y="431" class="small">literature review</text>
  <text x="78" y="451" class="small">systematic review</text>

  <rect x="300" y="354" width="220" height="126" class="panel"/>
  <text x="324" y="384" class="label">Academic Paper</text>
  <text x="324" y="411" class="small">outline, draft</text>
  <text x="324" y="431" class="small">abstract, revision</text>
  <text x="324" y="451" class="small">citation formatting</text>

  <rect x="546" y="354" width="220" height="126" class="panel"/>
  <text x="570" y="384" class="label">Paper Reviewer</text>
  <text x="570" y="411" class="small">peer-review panel</text>
  <text x="570" y="431" class="small">methodology critique</text>
  <text x="570" y="451" class="small">editorial decision</text>

  <rect x="792" y="354" width="220" height="126" class="panel"/>
  <text x="816" y="384" class="label">Academic Pipeline</text>
  <text x="816" y="411" class="small">research-to-paper</text>
  <text x="816" y="431" class="small">integrity gates</text>
  <text x="816" y="451" class="small">checkpoint dashboard</text>

  <rect x="1038" y="354" width="186" height="126" class="panel"/>
  <text x="1062" y="384" class="label">Experiment</text>
  <text x="1062" y="411" class="small">protocol planning</text>
  <text x="1062" y="431" class="small">statistical checks</text>
  <text x="1062" y="451" class="small">reproducibility</text>

  <path class="edge" d="M760 260 C760 340 164 340 164 354"/>
  <path class="edge" d="M760 260 C760 340 410 340 410 354"/>
  <path class="edge" d="M762 260 C762 342 656 342 656 354"/>
  <path class="edge" d="M766 260 C766 340 902 340 902 354"/>
  <path class="edge" d="M770 260 C770 340 1131 340 1131 354"/>

  <rect x="90" y="548" width="310" height="116" class="gate"/>
  <text x="114" y="580" class="label">Quality Gates</text>
  <circle cx="118" cy="608" r="4" class="dot"/>
  <text x="132" y="613" class="small">source and citation verification</text>
  <circle cx="118" cy="632" r="4" class="dot"/>
  <text x="132" y="637" class="small">phase boundary and passport reset</text>
  <circle cx="118" cy="656" r="4" class="dot"/>
  <text x="132" y="661" class="small">reviewer independence where needed</text>

  <rect x="486" y="548" width="308" height="116" class="stage"/>
  <text x="510" y="580" class="label">Scoped Execution</text>
  <text x="510" y="608" class="small">read selected WORKFLOW.md</text>
  <text x="510" y="632" class="small">load only relevant agents/templates</text>
  <text x="510" y="656" class="small">produce stage artifact in Codex</text>

  <rect x="880" y="548" width="310" height="116" class="output"/>
  <text x="904" y="580" class="label">Outputs</text>
  <text x="904" y="608" class="small">RQ brief, synthesis matrix, draft plan</text>
  <text x="904" y="632" class="small">review report, decision letter</text>
  <text x="904" y="656" class="small">pipeline dashboard or protocol checklist</text>

  <path class="edge-muted" d="M656 480 C656 515 245 515 245 548"/>
  <path class="edge" d="M400 606 C430 606 456 606 486 606"/>
  <path class="edge" d="M794 606 C824 606 850 606 880 606"/>

  <rect x="64" y="692" width="1152" height="42" class="panel-muted"/>
  <text x="88" y="718" class="caption">Figure. Codex registers one root skill, then routes each request to a scoped ARS workflow. Project-specific manuscript rules can remain in a separate meta-skill such as paper-writing-mode.</text>
</svg>
